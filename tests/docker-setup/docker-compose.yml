services:
  orthanc-a:
    image: orthancteam/orthanc:25.12.2
    ports: ["10042:8042"]
    environment:
      VERBOSE_STARTUP: "true"
      VERBOSE_ENABLED: "true"
      ORTHANC__DICOM_AET: ORTHANCA
      ORTHANC__NAME: orthanc-a-for-python-api-client-tests
      ORTHANC__STABLE_AGE: "2"
      ORTHANC__REGISTERED_USERS: |
        {"test": "test"}
      ORTHANC__DICOM_MODALITIES: |
        {"orthanc-a": ["ORTHANCA", "orthanc-a", 4242], "orthanc-b": ["ORTHANCB", "orthanc-b", 4242], "orthanc-c": ["ORTHANCC", "orthanc-c", 4242]}
      ORTHANC__DICOM_WEB__SERVERS: |
        {"orthanc-b": ["http://orthanc-b:8042/dicom-web/", "test", "test"]}
      ORTHANC__ORTHANC_PEERS: |
        {
          "orthanc-b": ["http://orthanc-b:8042/", "test", "test"],
          "orthanc-c" : {
            "Url": "http://orthanc-c:8042/",
            "Username": "test",
            "Password": "test",
            "RemoteSelf": "orthanc-a"
          }
        }
      ORTHANC__EXECUTE_LUA_ENABLED: "true"
      TRANSFERS_PLUGIN_ENABLED: "true"
      ORTHANC__CHECK_REVISIONS: "true"
      ORTHANC__OVERWRITE_INSTANCES: "true"
      # keep default KeepAliveTimeout and reduce the number of threads in order to test the retry mechanism
      ORTHANC__KEEP_ALIVE_TIMEOUT: "1"
      ORTHANC__HTTP_THREADS_COUNT: "10"
      ORTHANC__WORKLISTS__ENABLE: "true"
      ORTHANC__WORKLISTS__SAVE_IN_ORTHANC_DATABASE: "true"

  orthanc-b:
    build: orthanc-b
    ports: ["10043:8042"]
    environment:
      VERBOSE_STARTUP: "true"
      VERBOSE_ENABLED: "true"
      ORTHANC__PYTHON_SCRIPT: "/scripts/plugin.py"
      ORTHANC__DICOM_AET: ORTHANCB
      ORTHANC__NAME: orthanc-b-for-python-api-client-tests
      ORTHANC__REGISTERED_USERS: |
        {"test": "test"}
      ORTHANC__DICOM_MODALITIES: |
        {"orthanc-a": ["ORTHANCA", "orthanc-a", 4242], "orthanc-b": ["ORTHANCB", "orthanc-b", 4242], "orthanc-c": ["ORTHANCC", "orthanc-c", 4242]}
      ORTHANC__DICOM_WEB__SERVERS: |
        {"orthanc-a": ["http://orthanc-a:8042/dicom-web/", "test", "test"]}

      TRANSFERS_PLUGIN_ENABLED: "true"
      ORTHANC__CHECK_REVISIONS: "false"
      ORTHANC__OVERWRITE_INSTANCES: "true"
      # keep default KeepAliveTimeout and reduce the number of threads in order to test the retry mechanism
      ORTHANC__KEEP_ALIVE_TIMEOUT: "1"
      ORTHANC__HTTP_THREADS_COUNT: "20"

  orthanc-c:
    image: orthancteam/orthanc:25.12.2
    ports: ["10044:8042"]
    environment:
      VERBOSE_STARTUP: "true"
      VERBOSE_ENABLED: "true"
      ORTHANC__DICOM_AET: ORTHANCC
      ORTHANC__NAME: orthanc-c-for-python-api-client-tests
      ORTHANC__REGISTERED_USERS: |
        {"test": "test"}
      ORTHANC__DICOM_MODALITIES: |
        {"orthanc-a": ["ORTHANCA", "orthanc-a", 4242], "orthanc-b": ["ORTHANCB", "orthanc-b", 4242], "orthanc-c": ["ORTHANCC", "orthanc-c", 4242]}
      ORTHANC__DICOM_WEB__SERVERS: |
        {"orthanc-a": ["http://orthanc-a:8042/dicom-web/", "test", "test"]}
      ORTHANC__ORTHANC_PEERS: |
        {"orthanc-a": ["http://orthanc-a:8042/", "test", "test"]}
      # keep default KeepAliveTimeout and reduce the number of threads in order to test the retry mechanism
      ORTHANC__KEEP_ALIVE_TIMEOUT: "1"
      ORTHANC__HTTP_THREADS_COUNT: "5"

      TRANSFERS_PLUGIN_ENABLED: "true"
      ORTHANC__OVERWRITE_INSTANCES: "true"

  # extra orthanc for the tests related to the education plugin because the authentication mechanism is different
  orthanc-d:
    #image: orthancteam/orthanc:25.12.2
    image: orthancteam/orthanc-pre-release:2026.06.24
    # because we need this: https://orthanc.uclouvain.be/hg/orthanc-education/rev/0e695d856b0c
    ports: ["10045:8042"]
    environment:
      VERBOSE_STARTUP: "true"
      VERBOSE_ENABLED: "true"
      ORTHANC__DICOM_AET: ORTHANCD
      ORTHANC__NAME: orthanc-d-for-python-api-client-tests-education
      ORTHANC__STABLE_AGE: "2"
      ORTHANC__ORTHANC_EXPLORER_2__IS_DEFAULT_ORTHANC_UI: "false"
      ORTHANC__EDUCATION: |
        {
          "Enabled" : true,
          "PublicRoots" : [
            "http://localhost:10045"
          ],
          "AuthenticationHttpHeader" : "Mail",
          "Administrators" : {
            "Authentication" : "Login",
            "Credentials" : {
              "test" : "test"
            }
          },
          "StandardUsers" : {
            "Authentication" : "RestrictedHttpHeader",
            "RestrictedHeaders" : [ "api-key-to-change2"]
          },
          "WholeSlideImagingDicomizer" : "/usr/local/bin/OrthancWSIDicomizer",
          "OpenSlideLibrary" : "libopenslide.so.0"
        }
      ORTHANC__EXECUTE_LUA_ENABLED: "true"
      ORTHANC__CHECK_REVISIONS: "true"
      ORTHANC__OVERWRITE_INSTANCES: "true"
      # keep default KeepAliveTimeout and reduce the number of threads in order to test the retry mechanism
      ORTHANC__KEEP_ALIVE_TIMEOUT: "1"
      ORTHANC__HTTP_THREADS_COUNT: "10"
